<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Bible search icon">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f3f1e"/>
      <stop offset="100%" stop-color="#3e2313"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4e6bd"/>
      <stop offset="100%" stop-color="#d7c28b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd86a"/>
      <stop offset="100%" stop-color="#d89a00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.1" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- scroll pushed close to the left edge -->
  <g filter="url(#shadow)">
    <path d="M2 20c0-3.2 2.8-6 6-6h7v31H8c-3.2 0-6-2.8-6-6 0-2.2 1.1-4 2.9-5C3.1 33 2 31.2 2 29c0-2 1-3.8 2.6-4.9C3 23 2 21.7 2 20z"
          fill="#d7b071"/>
    <path d="M8 14c3.2 0 6 2.8 6 6s-2.8 6-6 6c-2.9 0-5.3-2-5.9-4.7.5 1 1.6 1.7 2.9 1.7 1.8 0 3.2-1.4 3.2-3.2S6.8 16.6 5 16.6c-1.3 0-2.4.7-2.9 1.7C2.7 16 5.1 14 8 14z"
          fill="#b98b46"/>
    <path d="M8 45c3.2 0 6 2.8 6 6s-2.8 6-6 6c-2.9 0-5.3-2-5.9-4.7.5 1 1.6 1.7 2.9 1.7 1.8 0 3.2-1.4 3.2-3.2S6.8 47.6 5 47.6c-1.3 0-2.4.7-2.9 1.7C2.7 47 5.1 45 8 45z"
          fill="#b98b46"/>
  </g>

  <!-- bible body -->
  <g filter="url(#shadow)">
    <rect x="14" y="7" width="35" height="49" rx="5" fill="url(#cover)"/>
    <rect x="17" y="10" width="29" height="43" rx="3.5" fill="#5a3118" opacity="0.35"/>
    <rect x="19" y="46" width="26" height="7" rx="1.5" fill="url(#pages)"/>
    <rect x="14" y="7" width="6" height="49" rx="5" fill="#341b0f" opacity="0.55"/>
    <path d="M29 16h6c.6 0 1 .4 1 1v7h7c.6 0 1 .4 1 1v6c0 .6-.4 1-1 1h-7v7c0 .6-.4 1-1 1h-6c-.6 0-1-.4-1-1v-7h-7c-.6 0-1-.4-1-1v-6c0-.6.4-1 1-1h7v-7c0-.6.4-1 1-1z"
          fill="url(#gold)"/>
    <path d="M24 53V42h5v8.5l-2.5 2.2z" fill="#c62828"/>
  </g>

  <!-- magnifying glass pushed close to the right/bottom edges -->
  <g filter="url(#shadow)">
    <circle cx="45.5" cy="39.5" r="11.5" fill="#f5f8fb" stroke="#8e99a4" stroke-width="2.5"/>
    <circle cx="45.5" cy="39.5" r="8.5" fill="#a6d8f7" opacity="0.65"/>
    <path d="M40.5 34.5c2-2.4 5.2-3.6 8.5-3" fill="none" stroke="#ffffff" stroke-width="2.3" stroke-linecap="round" opacity="0.9"/>
    <path d="M52.8 48.8 61 57.1c.8.8.8 2.1 0 2.9l-1 1c-.8.8-2.1.8-2.9 0L48.8 52.8z"
          fill="#3c2517"/>
    <path d="M53.4 49.4 59.4 55.4" stroke="#6a4935" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
